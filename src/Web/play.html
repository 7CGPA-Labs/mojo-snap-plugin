<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Mojo Snap Console</title>
    <link rel="icon" type="image/png" sizes="96x96" href="shared/logo96.png">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
        }
        #game-panel {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        canvas {
            width: 100%;
            height: 100%;
            display: block;
            border: 0;
            outline: none;
        }
        
        /* Overlay Menu Styles */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap');
        
        #mojo-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.3s ease;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        
        #mojo-overlay.visible {
            display: flex;
            opacity: 1;
        }
        
        .menu-wrapper {
            background: rgba(20, 20, 25, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            width: 500px;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            overflow: hidden;
            animation: slideUp 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes slideUp {
            from { transform: translateY(20px) scale(0.95); opacity: 0; }
            to { transform: translateY(0) scale(1); opacity: 1; }
        }

        .menu-header {
            padding: 25px 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            background: linear-gradient(180deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0) 100%);
        }

        .menu-title {
            font-size: 28px;
            font-weight: 800;
            color: #fff;
            margin: 0 0 15px 0;
            letter-spacing: -0.5px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .tabs {
            display: flex;
            gap: 10px;
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: #888;
            font-size: 14px;
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .tab-btn:hover {
            color: #ccc;
            background: rgba(255,255,255,0.05);
        }

        .tab-btn.active {
            color: #fff;
            background: rgba(255,255,255,0.1);
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .tab-content {
            padding: 20px 30px;
            overflow-y: auto;
            display: none;
            flex-direction: column;
            gap: 8px;
        }

        .tab-content.active {
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .menu-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #e0e0e0;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 15px;
            font-weight: 500;
        }

        .menu-item:hover, .menu-item:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.1);
            transform: translateX(5px);
            outline: none;
            color: #fff;
        }
        
        .menu-item.danger {
            color: #ff6b6b;
        }
        .menu-item.danger:hover {
            background: rgba(255, 50, 50, 0.15);
            border-color: rgba(255, 50, 50, 0.3);
            color: #ff8787;
        }

        .value-control {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .val-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: #fff;
            width: 28px;
            height: 28px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .val-btn:hover {
            background: rgba(255,255,255,0.2);
            transform: scale(1.1);
        }

        .val-text {
            min-width: 60px;
            text-align: center;
            font-weight: 600;
            color: #4facfe;
            text-shadow: 0 0 10px rgba(79, 172, 254, 0.3);
        }
    </style>
    <!-- Embed standard libraries from the served plugin paths -->
    <script src="shared/cores/browserfs.min.js?v=6" defer></script>
    <script src="shared/gameplay.js?v=6" defer></script>
    <script src="play.js?v=6" defer></script>
</head>
<body>
    <div id="game-panel">
        <canvas id="canvas"></canvas>
    </div>
    
    <!-- Mojo Snap In-Game Menu Overlay -->
    <div id="mojo-overlay">
        <div class="menu-wrapper">
            <div class="menu-header">
                <h2 class="menu-title">Mojo Snap OS</h2>
                <div class="tabs">
                    <button class="tab-btn active" onclick="window.switchMenuTab('quick')">Quick Menu</button>
                    <button class="tab-btn" onclick="window.switchMenuTab('settings')">Settings</button>
                </div>
            </div>
            
            <div id="tab-quick" class="tab-content active">
                <div class="menu-item" onclick="window.overlayActions.resume()">
                    <span>▶ Resume</span>
                </div>
                <div class="menu-item" onclick="window.overlayActions.reset()">
                    <span>🔄 Restart Game</span>
                </div>
                <div class="menu-item danger" onclick="window.overlayActions.exit()">
                    <span>⏹ Close Content</span>
                </div>
                
                <div class="menu-item" style="cursor: default;" onclick="event.stopPropagation()">
                    <span>State Slot</span>
                    <div class="value-control">
                        <button class="val-btn" onclick="window.overlayActions.decStateSlot(event)">-</button>
                        <span class="val-text" id="ui-state-slot">0</span>
                        <button class="val-btn" onclick="window.overlayActions.incStateSlot(event)">+</button>
                    </div>
                </div>
                <div class="menu-item" onclick="window.overlayActions.saveState()">
                    <span>💾 Save State</span>
                </div>
                <div class="menu-item" onclick="window.overlayActions.loadState()">
                    <span>📂 Load State</span>
                </div>
            </div>

            <div id="tab-settings" class="tab-content">
                <div class="menu-item" style="cursor: default;" onclick="event.stopPropagation()">
                    <span>Scaling Filter</span>
                    <div class="value-control">
                        <button class="val-btn" onclick="window.overlayActions.toggleFilter(event)">◀</button>
                        <span class="val-text" id="ui-filter">Sharp</span>
                        <button class="val-btn" onclick="window.overlayActions.toggleFilter(event)">▶</button>
                    </div>
                </div>
                <div class="menu-item" style="cursor: default;" onclick="event.stopPropagation()">
                    <span>Aspect Ratio</span>
                    <div class="value-control">
                        <button class="val-btn" onclick="window.overlayActions.toggleAspect(event)">◀</button>
                        <span class="val-text" id="ui-aspect">Core</span>
                        <button class="val-btn" onclick="window.overlayActions.toggleAspect(event)">▶</button>
                    </div>
                </div>
                <div class="menu-item" style="cursor: default;" onclick="event.stopPropagation()">
                    <span>Audio Mute</span>
                    <div class="value-control">
                        <button class="val-btn" onclick="window.overlayActions.toggleMute(event)">◀</button>
                        <span class="val-text" id="ui-mute">Off</span>
                        <button class="val-btn" onclick="window.overlayActions.toggleMute(event)">▶</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
