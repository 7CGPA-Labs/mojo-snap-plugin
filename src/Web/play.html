<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Mojo Snap Console</title>
    <link rel="icon" type="image/png" sizes="96x96" href="shared/logo96.png">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
        }
        #game-panel {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        canvas {
            width: 100%;
            height: 100%;
            display: block;
            border: 0;
            outline: none;
        }
        
        /* Overlay Menu Styles */
        #mojo-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        #mojo-overlay.visible {
            display: flex;
            opacity: 1;
        }
        
        .menu-container {
            background: rgba(20, 20, 30, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 30px;
            width: 350px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #fff;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .menu-header {
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
            color: #00a8ff;
            text-shadow: 0 0 10px rgba(0, 168, 255, 0.5);
        }
        
        .menu-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            padding: 12px 15px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .menu-btn:hover {
            background: rgba(0, 168, 255, 0.2);
            border-color: rgba(0, 168, 255, 0.5);
            transform: translateX(5px);
        }
        
        .menu-btn.primary {
            background: rgba(0, 168, 255, 0.2);
            border-color: #00a8ff;
            color: #fff;
            font-weight: bold;
            justify-content: center;
            margin-top: 10px;
        }
        
        .menu-btn.primary:hover {
            background: #00a8ff;
            transform: scale(1.02);
        }
        
        .menu-btn.danger {
            background: rgba(255, 50, 50, 0.1);
            border-color: rgba(255, 50, 50, 0.3);
            color: #ff6b6b;
        }
        
        .menu-btn.danger:hover {
            background: rgba(255, 50, 50, 0.3);
            border-color: #ff6b6b;
        }
    </style>
    <!-- Embed standard libraries from the served plugin paths -->
    <script src="shared/cores/browserfs.min.js?v=6" defer></script>
    <script src="shared/gameplay.js?v=6" defer></script>
    <script src="play.js?v=6" defer></script>
</head>
<body>
    <div id="game-panel">
        <canvas id="canvas"></canvas>
    </div>
    
    <!-- Mojo Snap In-Game Menu Overlay -->
    <div id="mojo-overlay">
        <div class="menu-container">
            <div class="menu-header">Mojo Snap OS</div>
            
            <button class="menu-btn" onclick="window.overlayActions.resume()">
                <span>▶ Resume Game</span>
            </button>
            <button class="menu-btn" onclick="window.overlayActions.saveState()">
                <span>💾 Save State</span>
            </button>
            <button class="menu-btn" onclick="window.overlayActions.loadState()">
                <span>📂 Load State</span>
            </button>
            <button class="menu-btn" onclick="window.overlayActions.screenshot()">
                <span>📸 Screenshot</span>
            </button>
            <button class="menu-btn" onclick="window.overlayActions.record()">
                <span>🎥 Screen Recording</span>
            </button>
            <button class="menu-btn" onclick="window.overlayActions.cheats()">
                <span>⭐ Cheat Manager</span>
            </button>
            <button class="menu-btn" onclick="window.overlayActions.mapping()">
                <span>🎮 Controller Mapping</span>
            </button>
            <button class="menu-btn danger" onclick="window.overlayActions.reset()">
                <span>🔄 Reset Game</span>
            </button>
            
            <button class="menu-btn primary" onclick="window.overlayActions.exit()">
                Exit Game
            </button>
        </div>
    </div>
</body>
</html>
