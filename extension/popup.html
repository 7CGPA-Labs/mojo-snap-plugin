<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      font-family: Arial, sans-serif;
      width: 180px;
      padding: 15px;
      margin: 0;
      background: #12131c;
      color: #fff;
      text-align: center;
    }
    h3 {
      margin: 0 0 15px 0;
      font-size: 14px;
      color: #00a8e1;
      letter-spacing: 1px;
    }
    button {
      background: #00a8e1;
      color: #12131c;
      border: none;
      padding: 10px 15px;
      font-weight: bold;
      font-size: 12px;
      cursor: pointer;
      border-radius: 4px;
      width: 100%;
      transition: background 0.2s;
    }
    button:hover {
      background: #008cc0;
    }
  </style>
</head>
<body>
  <h3>RETRO CONSOLE</h3>
  <button id="launch-btn">LAUNCH CONSOLE</button>
  <script src="popup.js"></script>
</body>
</html>
