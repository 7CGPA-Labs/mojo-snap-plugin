name: Build Mojo Snap Plugin

on:
  push:
    branches: [ "main" ]
    paths:
      - "src/**"
      - "shared/**"
      - "build.ps1"
      - ".github/workflows/build.yml"
  pull_request:
    branches: [ "main" ]
    paths:
      - "src/**"
      - "shared/**"
      - "build.ps1"
      - ".github/workflows/build.yml"

jobs:
  build:
    name: Build Mojo Snap Plugin
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'

      - name: Restore dependencies
        run: dotnet restore src/MojoSnapPlugin.csproj

      - name: Build plugin assembly
        run: dotnet build src/MojoSnapPlugin.csproj -c Release -o dist/

      - name: Upload Plugin Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mojo-snap-plugin
          path: dist/MojoSnapPlugin.dll
