<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Retro Web Console - Sound Matrix</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsnes/1.2.1/jsnes.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body {
            background-color: #08090d; color: #66fcf1; font-family: 'Press Start 2P', monospace;
            margin: 0; padding: 20px; height: 100vh; box-sizing: border-box;
            display: flex; align-items: center; justify-content: center;
        }
        .workspace-grid {
            display: grid; grid-template-columns: 1fr 360px; grid-template-rows: 180px 1fr 140px;
            gap: 20px; width: 100%; height: 100%; max-width: 1400px; max-height: 850px;
        }
        .panel { background: #12131c; border: 3px solid #1f2235; border-radius: 8px; padding: 15px; box-sizing: border-box; position: relative; overflow: hidden; }
        .panel-title { font-size: 10px; color: #4e5166; margin-bottom: 12px; text-transform: uppercase; }
        
        .game-output-panel { grid-column: 1; grid-row: 1 / span 3; display: flex; flex-direction: column; align-items: center; justify-content: center; border-color: #45f3ff; }
        .canvas-frame { background: #000; border: 6px solid #090a0f; border-radius: 4px; position: relative; }
        #nes-canvas { width: 640px; height: 600px; display: block; }

        /* Audio Unmute Overlay */
        #audio-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(18, 19, 28, 0.95); z-index: 10;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; text-align: center; border-radius: 4px;
        }
        .audio-btn { background: #ff4a5a; color: #fff; font-family: 'Press Start 2P'; border: none; padding: 15px 25px; font-size: 12px; border-radius: 4px; box-shadow: 0 4px #b3303c; margin-top: 15px; }
        
        .qr-panel { grid-column: 2; grid-row: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border-color: #ff4a5a; }
        #qrcode-container { padding: 6px; background: #fff; border-radius: 4px; }
        .games-list-panel { grid-column: 2; grid-row: 2; }
        .game-item { background: #1c1d2a; border: 2px solid #2d3047; padding: 12px; border-radius: 4px; font-size: 10px; color: #fff; }
        .game-item.active { border-color: #00f2fe; color: #00f2fe; }

        .status-panel { grid-column: 2; grid-row: 3; display: flex; flex-direction: column; gap: 10px; justify-content: center; }
        .player-status { font-size: 10px; display: flex; justify-content: space-between; align-items: center; }
        .status-indicator { width: 10px; height: 10px; border-radius: 50%; background: #2c1619; border: 2px solid #ff4a5a; }
        .status-indicator.online { background: #00f2fe; border-color: #45f3ff; box-shadow: 0 0 10px #00f2fe; }
        #sys-log { font-size: 8px; color: #4e5166; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    </style>
</head>
<body>

    <div class="workspace-grid">
        <div class="panel game-output-panel">
            <div class="panel-title" style="align-self: flex-start;">[01] EMULATOR CONTAINER</div>
            <div class="canvas-frame">
                <div id="audio-overlay" onclick="unlockAudioSystem()">
                    <div style="font-size: 11px; color: #00f2fe;">AUDIO SYSTEM RESTRICTED</div>
                    <button class="audio-btn">START EMULATION</button>
                </div>
                <canvas id="nes-canvas" width="256" height="240"></canvas>
            </div>
        </div>

        <div class="panel qr-panel">
            <div class="panel-title">[02] DISCOVERY ENTRY</div>
            <div id="qrcode-container"></div>
        </div>

        <div class="panel games-list-panel">
            <div class="panel-title">[03] REPOSITORY MATRIX</div>
            <div class="game-item active"><span>▶ </span><span>mario.nes</span></div>
        </div>

        <div class="panel status-panel">
            <div class="panel-title">[04] OPERATING CONTROLLER REGISTRY</div>
            <div class="player-status">
                <span>P1: <span id="p1-name" style="color:#ff4a5a;">OFFLINE</span></span>
                <div class="status-indicator" id="p1-indicator"></div>
            </div>
            <div class="player-status">
                <span>P2: <span id="p2-name" style="color:#ff4a5a;">OFFLINE</span></span>
                <div class="status-indicator" id="p2-indicator"></div>
            </div>
            <div id="sys-log">SYS: SYSTEM ACTIVE.</div>
        </div>
    </div>

    <script>
        const logDiv = document.getElementById('sys-log');
        const canvas = document.getElementById('nes-canvas');
        
        // 1. Core Web Audio Architecture Pipeline Definitions
        let audioContext = null;
        let audioSamplesBuffer = [];
        const BUFFER_LIMIT = 4096;

        function initializeAudioStack() {
            audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 44100 });
            
            // Allocate a legacy node architecture to process direct emulation audio sample arrays
            const scriptProcessor = audioContext.createScriptProcessor(2048, 0, 1);
            scriptProcessor.onaudioprocess = (e) => {
                const outputChannel = e.outputBuffer.getChannelData(0);
                for (let i = 0; i < outputChannel.length; i++) {
                    outputChannel[i] = audioSamplesBuffer.shift() || 0.0;
                }
            };
            scriptProcessor.connect(audioContext.destination);
        }

        function unlockAudioSystem() {
            initializeAudioStack();
            document.getElementById('audio-overlay').style.display = 'none';
            loadMarioROM();
        }

        // 2. JSNES Engine Integration
        const ctx = canvas.getContext("2d");
        const imageData = ctx.createImageData(256, 240);
        const buf = new ArrayBuffer(imageData.data.length);
        const buf8 = new Uint8ClampedArray(buf);
        const buf32 = new Uint32Array(buf);

        const nes = new jsnes.NES({
            onFrame: (buffer) => {
                let i = 0;
                for (let y = 0; y < 240; y++) {
                    for (let x = 0; x < 256; x++) {
                        buf32[i] = buffer[i] | 0xff000000; i++;
                    }
                }
                imageData.data.set(buf8); ctx.putImageData(imageData, 0, 0);
            },
            // Pipe output audio sample bits straight into processing ring buffer array
            onAudioSample: (left, right) => {
                if (audioContext) {
                    audioSamplesBuffer.push(left);
                    if (audioSamplesBuffer.length > BUFFER_LIMIT) audioSamplesBuffer.shift();
                }
            }
        });

        const nesButtonMap = {
            'A': jsnes.Controller.BUTTON_A, 'B': jsnes.Controller.BUTTON_B,
            'UP': jsnes.Controller.BUTTON_UP, 'DOWN': jsnes.Controller.BUTTON_DOWN,
            'LEFT': jsnes.Controller.BUTTON_LEFT, 'RIGHT': jsnes.Controller.BUTTON_RIGHT
        };

        const socket = new WebSocket(`ws://${window.location.host}`);
        socket.onopen = () => socket.send(JSON.stringify({ type: 'REGISTER_TV' }));

        socket.onmessage = (event) => {
            const msg = JSON.parse(event.data);

            if (msg.type === 'SYSTEM_CONFIG') {
                document.getElementById("qrcode-container").innerHTML = "";
                new QRCode(document.getElementById("qrcode-container"), {
                    text: msg.connectUrl, width: 100, height: 100
                });
            }

            if (msg.type === 'PLAYER_STATUS_UPDATE') {
                updateUIField('p1-indicator', 'p1-name', msg.p1Connected, msg.p1Name);
                updateUIField('p2-indicator', 'p2-name', msg.p2Connected, msg.p2Name);
            }

            if (msg.button !== undefined) {
                const targetButton = nesButtonMap[msg.button];
                if (targetButton !== undefined) {
                    if (msg.action === 'DOWN') nes.buttonDown(1, targetButton);
                    else nes.buttonUp(1, targetButton);
                }
            }
        };

        function updateUIField(indId, textId, active, handle) {
            const ind = document.getElementById(indId);
            const txt = document.getElementById(textId);
            if (active) {
                ind.classList.add('online'); txt.innerText = handle; txt.style.color = "#00f2fe";
            } else {
                ind.classList.remove('online'); txt.innerText = "OFFLINE"; txt.style.color = "#ff4a5a";
            }
        }

        function frameLoop() { requestAnimationFrame(frameLoop); nes.frame(); }

        function loadMarioROM() {
            fetch('/mario.nes')
                .then(res => res.arrayBuffer())
                .then(buffer => {
                    let bytes = new Uint8Array(buffer); let romData = "";
                    for (let i = 0; i < bytes.length; i++) { romData += String.fromCharCode(bytes[i]); }
                    nes.loadROM(romData); frameLoop();
                    logDiv.innerText = "SYS: CHANNELS BOOTED WITH AUDIO ENABLED.";
                });
        }
    </script>
</body>
</html>
