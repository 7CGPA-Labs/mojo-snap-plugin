<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Retro Web Console - Sound Matrix</title>
    <link href="/fonts/press-start-2p/index.css" rel="stylesheet">
    <style>
        body {
            background-color: #08090d; color: #66fcf1; font-family: 'Press Start 2P', monospace;
            margin: 0; padding: 20px; height: 100vh; box-sizing: border-box;
            display: flex; align-items: center; justify-content: center;
        }
        
        /* FSM Input Lock Overlay */
        body.gameplay-active { pointer-events: none; }
        #exit-btn { display: none; position: absolute; top: 20px; right: 20px; z-index: 1000; background: rgba(255, 74, 90, 0.1); border: 2px solid #ff4a5a; color: #ff4a5a; font-family: 'Press Start 2P'; font-size: 10px; padding: 12px; cursor: pointer; pointer-events: auto; border-radius: 4px; backdrop-filter: blur(4px); transition: 0.2s; }
        #exit-btn:hover { background: #ff4a5a; color: #12131c; }
        
        #pause-btn { display: none; position: absolute; top: 20px; right: 150px; z-index: 1000; background: rgba(0, 242, 254, 0.1); border: 2px solid #00f2fe; color: #00f2fe; font-family: 'Press Start 2P'; font-size: 10px; padding: 12px; cursor: pointer; pointer-events: auto; border-radius: 4px; backdrop-filter: blur(4px); transition: 0.2s; }
        #pause-btn:hover { background: #00f2fe; color: #12131c; }

        .workspace-grid {
            display: grid; grid-template-columns: 1fr 360px; grid-template-rows: 180px 1fr 140px;
            gap: 20px; width: 100%; height: 100%; max-width: 1400px; max-height: 850px;
        }
        .panel { background: #12131c; border: 3px solid #1f2235; border-radius: 8px; padding: 15px; box-sizing: border-box; position: relative; overflow: hidden; }
        .panel-title { font-size: 10px; color: #4e5166; margin-bottom: 12px; text-transform: uppercase; }
        
        .game-output-panel { grid-column: 1; grid-row: 1 / span 3; display: flex; flex-direction: column; align-items: center; justify-content: center; border-color: #45f3ff; }
        .canvas-frame { background: #000; border: 6px solid #090a0f; border-radius: 4px; position: relative; width: 100%; flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; box-sizing: border-box; }
        #emulator-container { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        #game-div { width: 100%; height: 100%; }
        #game-div canvas { width: 100% !important; height: 100% !important; object-fit: fill !important; }

        .qr-panel { grid-column: 2; grid-row: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border-color: #ff4a5a; }
        #qrcode-container { padding: 6px; background: #fff; border-radius: 4px; }
        
        /* Dynamic Console Directory List Styling */
        .games-list-panel { grid-column: 2; grid-row: 2; display: flex; flex-direction: column; }
        .tabs-container { display: flex; gap: 8px; margin-bottom: 12px; overflow-x: auto; padding-bottom: 4px; border-bottom: 2px solid #2d3047; }
        .tab-btn { background: transparent; border: 1px solid #2d3047; color: #4e5166; font-family: 'Press Start 2P'; font-size: 8px; padding: 8px 10px; cursor: pointer; border-radius: 4px; }
        .tab-btn.active { background: #00f2fe; color: #12131c; border-color: #00f2fe; }
        
        .game-list-viewport { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
        .game-item { background: #1c1d2a; border: 2px solid transparent; padding: 10px; border-radius: 4px; font-size: 8px; color: #fff; cursor: pointer; display: flex; align-items: center; transition: 0.1s; }
        .game-item:hover { border-color: #00f2fe; color: #00f2fe; transform: translateX(4px); }
        
        .meta-panel { background: #090a0f; padding: 12px; border-radius: 4px; border: 1px solid #1f2235; min-height: 85px; }
        #meta-title { color: #00f2fe; font-size: 10px; margin-bottom: 8px; }
        #meta-console { color: #ff4a5a; font-size: 8px; margin-bottom: 8px; }
        #meta-desc { color: #8e92a8; font-size: 8px; line-height: 1.5; height: 35px; overflow-y: hidden; }

        .status-panel { grid-column: 2; grid-row: 3; display: flex; flex-direction: column; gap: 10px; justify-content: center; }
        .player-status { font-size: 10px; display: flex; justify-content: space-between; align-items: center; }
        .status-indicator { width: 10px; height: 10px; border-radius: 50%; background: #2c1619; border: 2px solid #ff4a5a; }
        .status-indicator.online { background: #00f2fe; border-color: #45f3ff; box-shadow: 0 0 10px #00f2fe; }
        #sys-log { font-size: 8px; color: #4e5166; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    </style>
</head>
<body>

    <button id="exit-btn" onclick="ApplicationState.exitGameplay()" onmousedown="event.preventDefault()">[EXIT GAME]</button>
    <button id="pause-btn" onclick="ApplicationState.togglePause()" onmousedown="event.preventDefault()">[PAUSE]</button>

    <div class="workspace-grid">
        <div class="panel game-output-panel">
            <div class="panel-title" style="align-self: flex-start;">[01] EMULATOR CONTAINER</div>
            <div class="canvas-frame">
                <div id="emulator-container"></div>
            </div>
        </div>

        <div class="panel qr-panel">
            <div class="panel-title">[02] DISCOVERY ENTRY</div>
            <div id="qrcode-container"></div>
        </div>

        <div class="panel games-list-panel">
            <div class="panel-title">[03] REPOSITORY MATRIX</div>
            <div class="tabs-container" id="console-tabs"></div>
            <div class="game-list-viewport" id="game-list"></div>
            <div class="meta-panel">
                <div id="meta-title">SYSTEM READY</div>
                <div id="meta-console">WAITING FOR SELECTION</div>
                <div id="meta-desc">Hover over a game entry to load configurations...</div>
            </div>
        </div>

        <div class="panel status-panel">
            <div class="panel-title">[04] OPERATING CONTROLLER REGISTRY</div>
            <div class="player-status">
                <span>P1: <span id="p1-name" style="color:#ff4a5a;">OFFLINE</span></span>
                <div class="status-indicator" id="p1-indicator"></div>
            </div>
            <div class="player-status">
                <span>P2: <span id="p2-name" style="color:#ff4a5a;">OFFLINE</span></span>
                <div class="status-indicator" id="p2-indicator"></div>
            </div>
            <div id="sys-log">SYS: SYSTEM ACTIVE.</div>
        </div>
    </div>

    <script>
        const logDiv = document.getElementById('sys-log');
        let libraryData = [];
        
        // FSM: The Application State Arbitrator
        const ApplicationState = {
            current: 'LOBBY', // 'LOBBY' | 'GAMEPLAY'
            isPaused: false,
            
            enterGameplay: async function(game) {
                this.current = 'GAMEPLAY';
                this.isPaused = false;
                document.body.classList.add('gameplay-active'); // Locks out global mouse inputs
                document.getElementById('exit-btn').style.display = 'block';
                document.getElementById('pause-btn').style.display = 'block';
                document.getElementById('pause-btn').innerText = '[PAUSE]';
                
                socket.send(JSON.stringify({ type: 'TV_STATE_CHANGE', state: 'GAMEPLAY' }));
                logDiv.innerText = `SYS: LAUNCHING ${game.console} KERNEL...`;
                
                loadROM(game);
            },

            exitGameplay: function() {
                this.current = 'LOBBY';
                document.body.classList.remove('gameplay-active'); // Restores LG Magic Remote UI
                document.getElementById('exit-btn').style.display = 'none';
                document.getElementById('pause-btn').style.display = 'none';
                
                // Clear EmulatorJS Container entirely to kill the emulator lifecycle
                document.getElementById('emulator-container').innerHTML = '';
                
                socket.send(JSON.stringify({ type: 'TV_STATE_CHANGE', state: 'LOBBY' }));
                logDiv.innerText = `SYS: TEARDOWN COMPLETE. SYSTEM READY.`;
            },
            
            togglePause: function() {
                if (!window.EJS_emulator) return; // Ensure emulator is actually running
                
                this.isPaused = !this.isPaused;
                const pauseBtn = document.getElementById('pause-btn');
                const canvas = document.querySelector('#game-div canvas');
                
                // Instantly remove browser focus from the button so it doesn't steal keyboard inputs
                pauseBtn.blur(); 
                
                if (this.isPaused) {
                    pauseBtn.innerText = '[RESUME]';
                    try {
                        // Bypass the top-level EJS_emulator.pause() UI overlay state machine and hit the engine directly
                        if (window.EJS_emulator.gameManager && typeof window.EJS_emulator.gameManager.pause === 'function') window.EJS_emulator.gameManager.pause();
                        else if (window.EJS_emulator.Module && typeof window.EJS_emulator.Module.pauseMainLoop === 'function') window.EJS_emulator.Module.pauseMainLoop();
                    } catch (e) { console.warn("[TV] Pause command failed:", e); }
                } else {
                    pauseBtn.innerText = '[PAUSE]';
                    
                    // Restore focus immediately before resuming
                    if (canvas) canvas.focus();
                    
                    try {
                        if (window.EJS_emulator.gameManager && typeof window.EJS_emulator.gameManager.resume === 'function') window.EJS_emulator.gameManager.resume();
                        else if (window.EJS_emulator.Module && typeof window.EJS_emulator.Module.resumeMainLoop === 'function') window.EJS_emulator.Module.resumeMainLoop();
                    } catch (e) { console.warn("[TV] Resume command failed:", e); }
                }
            }
        };

        // Dynamic Library Fetcher
        async function initializeLibrary() {
            const response = await fetch('/api/games');
            libraryData = await response.json();
            
            const consoles = ['ALL', ...new Set(libraryData.map(g => g.console))];
            const tabContainer = document.getElementById('console-tabs');
            
            consoles.forEach((cons, idx) => {
                const btn = document.createElement('button');
                btn.className = `tab-btn ${idx === 0 ? 'active' : ''}`;
                btn.innerText = `[${cons}]`;
                btn.onclick = () => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    renderLibraryList(cons);
                };
                tabContainer.appendChild(btn);
            });
            
            renderLibraryList('ALL');
        }

        function renderLibraryList(filter) {
            const list = document.getElementById('game-list');
            list.innerHTML = '';
            const data = filter === 'ALL' ? libraryData : libraryData.filter(g => g.console === filter);
            
            data.forEach(game => {
                const item = document.createElement('div');
                item.className = 'game-item';
                item.innerText = `▶ ${game.title}`;
                item.onmouseenter = () => {
                    document.getElementById('meta-title').innerText = game.title;
                    document.getElementById('meta-console').innerText = `${game.console} // REL: ${game.release}`;
                    document.getElementById('meta-desc').innerText = game.description;
                };
                item.onclick = () => ApplicationState.enterGameplay(game);
                list.appendChild(item);
            });
        }
        
        // 🎮 NATIVE HTML5 GAMEPAD MOCKING 🎮
        const virtualGamepads = [null, null, null, null];
        
        Object.defineProperty(navigator, 'getGamepads', {
            value: () => virtualGamepads,
            configurable: true
        });

        const gamepadMap = {
            'B': 0, 'A': 1, 'SELECT': 8, 'START': 9,
            'UP': 12, 'DOWN': 13, 'LEFT': 14, 'RIGHT': 15
        };

        function getOrCreateGamepad(index) {
            if (!virtualGamepads[index]) {
                virtualGamepads[index] = {
                    id: `Standard Gamepad (Virtual Controller ${index + 1})`,
                    index: index,
                    connected: true,
                    timestamp: performance.now(),
                    mapping: 'standard',
                    axes: [0, 0, 0, 0],
                    buttons: Array(18).fill(null).map(() => ({ pressed: false, touched: false, value: 0 }))
                };
                
                // Alert the browser and EmulatorJS that a new physical controller was plugged in
                const ev = new Event('gamepadconnected');
                ev.gamepad = virtualGamepads[index];
                window.dispatchEvent(ev);
                console.log(`[TV] 🎮 Virtual Gamepad ${index + 1} securely registered to browser hardware loop.`);
            }
            return virtualGamepads[index];
        }

        const socket = new WebSocket(`ws://${window.location.host}`);
        socket.onopen = () => socket.send(JSON.stringify({ type: 'REGISTER_TV' }));

        socket.onmessage = (event) => {
            const msg = JSON.parse(event.data);

            if (msg.type === 'SYSTEM_CONFIG') {
                document.getElementById("qrcode-container").innerHTML = "";
                if (msg.qrDataUrl) {
                    document.getElementById("qrcode-container").innerHTML = `<img src="${msg.qrDataUrl}" alt="Controller URL" style="display: block;">`;
                }
            }

            if (msg.type === 'PLAYER_STATUS_UPDATE') {
                updateUIField('p1-indicator', 'p1-name', msg.p1Connected, msg.p1Name);
                updateUIField('p2-indicator', 'p2-name', msg.p2Connected, msg.p2Name);
            }

            if (msg.button !== undefined && msg.player !== undefined) {
                console.log(`[TV] Received Input: Player ${msg.player} | Button: ${msg.button} | Action: ${msg.action}`);
                
                // FSM Input Barrier: Silently discard WS Controller events if in LOBBY mode
                if (ApplicationState.current !== 'GAMEPLAY') {
                    console.log(`[TV] Input Dropped: System is in LOBBY mode.`);
                    return; 
                }

                const gamepadIndex = msg.player - 1; // Player 1 is array index 0
                const btnIndex = gamepadMap[msg.button];

                if (btnIndex !== undefined) {
                    const pad = getOrCreateGamepad(gamepadIndex);
                    const isPressed = msg.action === 'DOWN';
                    
                    pad.buttons[btnIndex].pressed = isPressed;
                    pad.buttons[btnIndex].value = isPressed ? 1 : 0;
                    pad.timestamp = performance.now();
                } else {
                    console.warn(`[TV] Unmapped button or missing gamepad index: ${msg.button}`);
                }
            }
        };

        function updateUIField(indId, textId, active, handle) {
            const ind = document.getElementById(indId);
            const txt = document.getElementById(textId);
            if (active) {
                ind.classList.add('online'); txt.innerText = handle; txt.style.color = "#00f2fe";
            } else {
                ind.classList.remove('online'); txt.innerText = "OFFLINE"; txt.style.color = "#ff4a5a";
            }
        }

        function loadROM(game) {
            document.getElementById('emulator-container').innerHTML = '<div id="game-div"></div>';
            
            // Map standard console names into explicit EmulatorJS core identifiers
            const coreMap = {
                'NES': 'nes',
                'SEGA': 'md',
                'PS1': 'psx',
                'SNES': 'snes',
                'GBA': 'gba'
            };
            
            window.EJS_player = '#game-div';
            window.EJS_core = coreMap[game.console.toUpperCase()] || 'nes';
            window.EJS_gameUrl = game.path;
            window.EJS_pathtodata = '/emulatorjs/data/'; // Fetch WASM Cores directly from local offline directory
            window.EJS_startOnLoaded = true; // Bypass the Start Game overlay screen
            window.EJS_hideSettings = true; // Hide default EmulatorJS overlay media controls
            window.EJS_volume = 1; // Set emulator volume to 100% (value between 0 and 1)
            window.EJS_Buttons = { fullscreen: false }; // Explicitly disable native fullscreen controls

            // Inject the dynamic loader script
            const existingScript = document.getElementById('ejs-loader');
            if (existingScript) existingScript.remove();
            
            const script = document.createElement('script');
            script.id = 'ejs-loader';
            script.src = '/emulatorjs/data/loader.js';
            document.body.appendChild(script);
        }
        
        window.onload = initializeLibrary;
    </script>
</body>
</html>
